<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Engine Termo Control</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: #1e1e1e; padding: 2rem; border-radius: 1.5rem; width: 100%; max-width: 380px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .temp-display { font-size: 4.5rem; font-weight: bold; color: #ff9800; margin: 0.5rem 0; }
        .btn { width: 100%; padding: 1rem; margin: 0.5rem 0; border: none; border-radius: 0.8rem; font-size: 1rem; font-weight: bold; cursor: pointer; }
        .controls-box { background: #2a2a2a; padding: 1.2rem; border-radius: 1rem; margin-top: 1rem; text-align: left; }
    </style>
</head>
<body>

<div class="card">
    <div class="temp-display" id="temp">--°C</div>
    <div id="relay">Реле: ---</div>
    <button id="connectBtn" class="btn" onclick="connect()" style="background:#4caf50;">ПОДКЛЮЧИТЬСЯ</button>

    <div class="controls-box">
        <label>Порог: <span id="thrVal" style="color:#ff9800;">45</span>°C</label>
        <input type="range" id="thrSlider" min="20" max="70" value="45" 
               oninput="document.getElementById('thrVal').innerText = this.value"
               onchange="sendConfig()">
        
        <button class="btn" onclick="handleMainButton()" style="background:#2196f3;">УСТАНОВИТЬ И ВКЛ</button>
        <button class="btn" onclick="send('OFF')" style="background:#f44336;">ВЫКЛЮЧИТЬ ВСЁ</button>

        <label>Время: <input type="time" id="schedTime" value="07:00" onchange="sendConfig()"></label>
        <br><br>
        <label><input type="checkbox" id="checkTime" onchange="toggleMode()"> По времени</label>
    </div>
</div>

<script>
    const UUID_SERV = '12345678-1234-5678-1234-567812345678';
    const UUID_CMD  = '87654321-4321-4321-4321-210987654321';
    const UUID_DATA = '11111111-2222-3333-4444-555555555555';

    let cmdChar, dataChar, isSending = false;
    let commandQueue = [];

    // ИСПРАВЛЕНО: Реальная очередь команд, чтобы не было "Занято, жду..."
    async function send(msg) {
        commandQueue.push(msg);
        processQueue();
    }

    async function processQueue() {
        if (isSending || commandQueue.length === 0 || !cmdChar) return;
        isSending = true;
        const msg = commandQueue.shift();
        try {
            await cmdChar.writeValue(new TextEncoder().encode(msg));
            await new Promise(r => setTimeout(r, 150)); // Пауза между командами для BLE
        } catch (e) { console.error(e); }
        finally { isSending = false; processQueue(); }
    }

    async function handleMainButton() {
        document.getElementById('checkTime').checked = false;
        await sendConfig();
        await send("ON"); // Команда ON встанет в очередь после CFG
    }

    async function toggleMode() { await sendConfig(); }

    async function sendConfig() {
        const thr = document.getElementById('thrSlider').value;
        const time = document.getElementById('schedTime').value;
        const useTime = document.getElementById('checkTime').checked ? 1 : 0;
        await send(`CFG:${thr},${time},${useTime},0`);
    }

    async function connect() {
        try {
            const device = await navigator.bluetooth.requestDevice({ filters: [{ services: [UUID_SERV] }] });
            const server = await device.gatt.connect();
            const service = await server.getPrimaryService(UUID_SERV);
            cmdChar = await service.getCharacteristic(UUID_CMD);
            dataChar = await service.getCharacteristic(UUID_DATA);

            await dataChar.startNotifications();
            dataChar.addEventListener('characteristicvaluechanged', (e) => {
                const parts = new TextDecoder().decode(e.target.value).split('|');
                if (parts.length >= 7) {
                    document.getElementById('temp').innerText = parts[0] + "°C";
                    document.getElementById('relay').innerText = "Реле: " + parts[1];
                    document.getElementById('schedTime').value = parts[4];
                    document.getElementById('checkTime').checked = (parts[5] === "1");
                    document.getElementById('thrSlider').value = parts[3];
                    document.getElementById('thrVal').innerText = parts[3];
                }
            });
            await send(`TIME:${new Date().getHours()},${new Date().getMinutes()}`);
            await send("GET_CFG");
            document.getElementById('connectBtn').innerText = "ПОДКЛЮЧЕНО";
        } catch (err) { console.error(err); alert("Ошибка связи"); }
    }
</script>
</body>
</html>
