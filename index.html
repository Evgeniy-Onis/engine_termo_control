<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Engine Termo Control</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: #1e1e1e; padding: 2rem; border-radius: 1.5rem; width: 100%; max-width: 380px; text-align: center; }
        .temp-display { font-size: 4.5rem; font-weight: bold; color: #ff9800; margin: 0.5rem 0; }
        .btn { width: 100%; padding: 1rem; margin: 0.5rem 0; border: none; border-radius: 0.8rem; font-weight: bold; cursor: pointer; color: white; transition: 0.2s; }
        .controls-box { background: #2a2a2a; padding: 1.2rem; border-radius: 1rem; margin-top: 1rem; text-align: left; }
        input[type="range"] { width: 100%; margin: 15px 0; }
        .sched-row { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; border-top: 1px solid #444; padding-top: 10px; }
        input[type="time"] { background: #333; color: white; border: 1px solid #444; padding: 5px; border-radius: 5px; font-size: 1rem; }
        input[type="checkbox"] { transform: scale(1.3); }
    </style>
</head>
<body>
<div class="card">
    <div id="status-line" style="color:#888; font-size:0.8rem; height: 1rem;">Отключено</div>
    <div class="temp-display" id="temp">--°C</div>
    <div style="margin-bottom: 15px;">Реле: <span id="relay" style="font-weight:bold;">---</span></div>
    <button id="connectBtn" class="btn" style="background:#4caf50" onclick="connect()">ПОДКЛЮЧИТЬСЯ</button>

    <div class="controls-box">
        <div style="display:flex; justify-content: space-between;">
            <span>Порог: <b id="thrVal">45</b>°C</span>
        </div>
        <input type="range" id="thrSlider" min="20" max="70" value="45" 
               oninput="document.getElementById('thrVal').innerText=this.value" onchange="sendCfg()">
        
        <button id="mainBtn" class="btn" style="background:#2196f3" onclick="send('ON')">УСТАНОВИТЬ И ВКЛ</button>
        <button class="btn" style="background:#f44336" onclick="handleReset()">ВЫКЛЮЧИТЬ ВСЁ</button>

        <div class="sched-row">
            <label id="timeLabel">Время / Пауза:</label>
            <input type="time" id="schedTime" value="00:10" onchange="sendCfg()">
        </div>
        <div class="sched-row">
            <label><input type="checkbox" id="checkTime" onchange="toggleMode('time')"> Таймер</label>
            <label><input type="checkbox" id="checkInt" onchange="toggleMode('int')"> Интервалы</label>
        </div>
    </div>
</div>

<script>
    let cmdChar;

    // Взаимное исключение чекбоксов и смена текста кнопки
    function toggleMode(m) {
        const ct = document.getElementById('checkTime');
        const ci = document.getElementById('checkInt');
        if(m==='time' && ct.checked) ci.checked = false;
        if(m==='int' && ci.checked) ct.checked = false;
        refreshUI();
        sendCfg();
    }

    function refreshUI() {
        const btn = document.getElementById('mainBtn');
        const isT = document.getElementById('checkTime').checked;
        const isI = document.getElementById('checkInt').checked;
        
        if(isT) {
            btn.innerText = "ЗАПУСК ПО ТАЙМЕРУ";
            btn.style.background = "#ff9800";
        } else if(isI) {
            btn.innerText = "ЗАПУСТИТЬ С ИНТЕРВАЛОМ";
            btn.style.background = "#9c27b0";
        } else {
            btn.innerText = "УСТАНОВИТЬ И ВКЛ";
            btn.style.background = "#2196f3";
        }
    }

    // Сброс всего
    function handleReset() {
        document.getElementById('checkTime').checked = false;
        document.getElementById('checkInt').checked = false;
        refreshUI();
        send("OFF");
    }

    function sendCfg() {
        if(!cmdChar) return;
        const msg = `CFG:${document.getElementById('thrSlider').value},${document.getElementById('schedTime').value},${document.getElementById('checkTime').checked?1:0},${document.getElementById('checkInt').checked?1:0}`;
        send(msg);
    }

    async function send(m) { if(cmdChar) await cmdChar.writeValue(new TextEncoder().encode(m)); }

    async function connect() {
        try {
            const dev = await navigator.bluetooth.requestDevice({filters: [{services: ['12345678-1234-5678-1234-567812345678']}]});
            const gatt = await dev.gatt.connect();
            const serv = await gatt.getPrimaryService('12345678-1234-5678-1234-567812345678');
            cmdChar = await serv.getCharacteristic('87654321-4321-4321-4321-210987654321');
            const dChar = await serv.getCharacteristic('11111111-2222-3333-4444-555555555555');
            
            await dChar.startNotifications();
            dChar.addEventListener('characteristicvaluechanged', (e) => {
                const p = new TextDecoder().decode(e.target.value).split('|');
                if (p.length >= 7) {
                    // Обновляем динамику всегда
                    document.getElementById('temp').innerText = p[0] + "°C";
                    const relayEl = document.getElementById('relay');
                    relayEl.innerText = p[1];
                    relayEl.style.color = (p[1] === "ON") ? "#4caf50" : "#f44336";
                    
                    const stLine = document.getElementById('status-line');
                    stLine.innerText = (p[2] === "L") ? "ОЖИДАНИЕ ОСТЫВАНИЯ" : "В СЕТИ";
                    stLine.style.color = (p[2] === "L") ? "#ff9800" : "#4caf50";

                    // Обновляем настройки только если поля не в фокусе
                    if (document.activeElement.tagName !== "INPUT") {
                        document.getElementById('thrSlider').value = p[3];
                        document.getElementById('thrVal').innerText = p[3];
                        document.getElementById('schedTime').value = p[4];
                        document.getElementById('checkTime').checked = (p[5] === "1");
                        document.getElementById('checkInt').checked = (p[6] === "1");
                        refreshUI();
                    }
                }
            });

            const n = new Date();
            await send(`TIME:${n.getHours()},${n.getMinutes()}`);
            document.getElementById('connectBtn').innerText = "ПОДКЛЮЧЕНО";
            document.getElementById('connectBtn').style.background = "#333";
            document.getElementById('connectBtn').disabled = true;
        } catch(err) { console.log(err); }
    }
</script>
</body>
</html>
